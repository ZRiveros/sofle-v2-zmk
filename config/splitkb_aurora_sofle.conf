# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display (OLED)
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306_DEFAULT_CONTRAST=5
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=600

# RGB underglow - white at 10%
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=5

# Power / idle / sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_EXT_POWER=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=60000

# Bluetooth settings
CONFIG_BT_CTLR_TX_PWR_0=y

# 🔥 USB (FIX)
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y
# CONFIG_ZMK_USB_LOGGING=y   # ❌ Disable this (was breaking HID)

# 🔥 Mouse / input (for touchpad)
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_INPUT_MOUSE=y

# Faster debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
