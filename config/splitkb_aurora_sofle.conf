# Encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display (OLED)
CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306_DEFAULT_CONTRAST=5

# ⚠️ Widgets funkar bara på central (vänster half)
# Kommentera bort för att undvika warnings
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=600

# RGB — per-key only (underglow bypassed via JP2 hardware jumper)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=5
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=5

# Power: disable sleep for faster connection reliability (higher power draw)
# Disabling sleep prevents peripherals from going into low-power modes that
# cause extra connection attempts on pairing and can make the split slow to
# reconnect in some Linux environments.
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_EXT_POWER=y
# Set idle timeouts to 0 (disabled) so the halves do not enter idle/sleep.
CONFIG_ZMK_IDLE_TIMEOUT=0
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=0

# Bluetooth
CONFIG_BT_CTLR_TX_PWR_0=y

# USB
CONFIG_ZMK_USB=y

# Mouse / Pointing (touchpad)
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# Debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
