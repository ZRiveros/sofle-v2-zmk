# Touchpad driver (right/peripheral side)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# No physical display on right side
CONFIG_ZMK_DISPLAY=n

# Faster BLE connection interval for lower mouse latency (7.5ms min)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Stack sizes — I2C polling needs headroom
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096
