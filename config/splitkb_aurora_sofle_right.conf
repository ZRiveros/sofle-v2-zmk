# Touchpad driver (right/peripheral side)
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_INPUT_AZOTEQ_IQS5XX=y

# Stack sizes — I2C polling needs headroom
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=4096

# Logging (temporary — for touchpad debugging)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_I2C_LOG_LEVEL_DBG=y
CONFIG_I2C_NRFX_LOG_LEVEL_DBG=y
CONFIG_LOG_BUFFER_SIZE=4096
